<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>games</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: #1a1c2c; color: #fff; font-family: 'Press Start 2P', monospace; display: flex; flex-direction: column; align-items: center; min-height: 100vh; padding: 2rem; }
    h1 { color: #ff004d; font-size: 1.2rem; margin-bottom: 0.4rem; margin-top: 1rem; }
    .sub { font-size: 0.5rem; color: #7e7e7e; margin-bottom: 2.5rem; }
    .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 220px)); gap: 1.5rem; justify-content: center; }
    .cart { background: #111318; border: 2px solid #333; border-radius: 8px; padding: 1.5rem; text-align: left; transition: transform 0.15s, border-color 0.15s; }
    .cart:hover { transform: translateY(-4px); border-color: #ff004d; }
    .thumb { width: 100%; aspect-ratio: 1; background: #000; border-radius: 4px; display: flex; align-items: center; justify-content: center; font-size: 3rem; margin-bottom: 1rem; }
    .title { font-size: 0.6rem; margin-bottom: 0.4rem; }
    .meta { font-size: 0.45rem; color: #7e7e7e; margin-bottom: 1rem; font-family: sans-serif; }
    .play { display: block; text-align: center; text-decoration: none; padding: 0.5rem; border: 1.5px solid #ff004d; border-radius: 4px; color: #ff004d; font-size: 0.5rem; transition: background 0.15s, color 0.15s; }
    .play:hover { background: #ff004d; color: #fff; }
    footer { margin-top: 2.5rem; font-size: 0.4rem; color: #444; }
  </style>
</head>
<body>
  <h1>🎮 GAMES</h1>
  <p class="sub">by ToWXP</p>

  <div class="grid">
    <div class="cart">
      <div class="thumb">👾</div>
      <p class="title">DOOM</p>
      <p class="meta">pico-8 · 2024</p>
      <a href="doom.html" class="play">▶ PLAY</a>
    </div>

  <footer>made with pico-8</footer>
</body>
</html>
